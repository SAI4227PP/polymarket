apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: polymarket-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: polymarket-bot-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: polymarket-config
            - secretRef:
                name: polymarket-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: polymarket-bot
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP

