services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d polymarket"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  trader:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.trader
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
      POLYMARKET_AUTO_EVENT_PREFIX: btc-updown-5m
      POLYMARKET_AUTO_EVENT_MODE: epoch_5m
      POLYMARKET_MARKET_WS_URL: wss://ws-subscriptions-frontend-clob.polymarket.com/ws/market
      POLYMARKET_GAMMA_API_URL: https://gamma-api.polymarket.com
      POLYMARKET_WS_DEBUG: "1"
      TRADER_DEBUG_QUOTES: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.api
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      trader:
        condition: service_started
    restart: unless-stopped

  supervisor:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.supervisor
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deployments/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

